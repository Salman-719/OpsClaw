name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

permissions:
  id-token: write   # needed for OIDC federation
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint + Unit Tests
  # ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r agent/requirements.txt
          pip install pytest httpx

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run Python unit tests
        env:
          LOCAL_MODE: "true"
        run: |
          python -m pytest tests/test_pipeline.py tests/test_agent.py -v --tb=short --color=yes

  # ─────────────────────────────────────────────────────────
  # Job 2: CDK Deploy (only on push to main, after tests pass)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: CDK Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap
        run: cdk bootstrap --app "python3 infra/app.py"

      # Phase 1: Deploy Pipeline + Agent (need ALB URL before building frontend)
      - name: Deploy Pipeline + Agent
        run: |
          cdk deploy ConutPipeline-dev ConutAgent-dev \
            --require-approval never \
            --app "python3 infra/app.py"

      # Phase 2: Build frontend (CloudFront proxies /api/* to ALB)
      - name: Build frontend
        run: cd frontend && npm run build

      # Phase 3: Deploy Frontend (S3 + CloudFront)
      - name: Deploy Frontend
        run: |
          cdk deploy ConutFrontend-dev \
            --require-approval never \
            --app "python3 infra/app.py" \
            --outputs-file cdk-outputs.json

      # Phase 4: Invalidate CloudFront cache
      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConutFrontend-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" --paths "/*" \
            --query 'Invalidation.Status' --output text

      - name: Print stack outputs
        if: success()
        run: cat cdk-outputs.json
